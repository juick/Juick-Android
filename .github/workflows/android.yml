name: Android CI

on:
  pull_request:
  push:
    branches: [master]
jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '25'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
    - name: Build
      run: ./gradlew assembleDebug
